<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#05070d" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/svg+xml" href="icon.svg" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Countdown" />
  <title>Countdown</title>
  <style>
    @font-face {
      font-family: 'DSEG7';
      src: url('https://cdn.jsdelivr.net/gh/keshikan/DSEG@v0.46/fonts/DSEG7-Classic/DSEG7Classic-Bold.ttf') format('truetype');
      font-display: swap;
    }

    :root {
      --bg: #05070d;
      --digit: #2b6cff;
      --digit-glow: rgba(43, 108, 255, 0.35);
      --dim: rgba(43, 108, 255, 0.07);
      --label: #4a6fa5;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--digit);
      font-family: 'DSEG7', 'Courier New', monospace;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding:
        max(12px, env(safe-area-inset-top))
        max(12px, env(safe-area-inset-right))
        max(12px, env(safe-area-inset-bottom))
        max(12px, env(safe-area-inset-left));
    }

    .countdown {
      display: grid;
      grid-template-columns: repeat(4, auto);
      gap: clamp(10px, 3.5vw, 28px);
      align-items: end;
      justify-items: center;
    }

    .unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(8px, 1.8vw, 14px);
    }

    .digits {
      position: relative;
      z-index: 0;
      font-family: 'DSEG7', 'Courier New', monospace;
      font-size: clamp(44px, 14vw, 128px);
      line-height: 1;
      letter-spacing: 0.04em;
      color: var(--digit);
      text-shadow:
        0 0 10px var(--digit-glow),
        0 0 28px var(--digit-glow);
    }

    /* Dim "off" 7-segment ghost behind live digits — classic LCD look */
    .digits::before {
      content: attr(data-shadow);
      position: absolute;
      inset: 0;
      color: var(--dim);
      text-shadow: none;
      z-index: -1;
    }

    .label {
      font-family: 'Courier New', monospace;
      font-size: clamp(10px, 2.2vw, 14px);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--label);
    }

    .footer {
      position: fixed;
      bottom: max(12px, env(safe-area-inset-bottom));
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      letter-spacing: 0.25em;
      color: var(--label);
    }

    /* Milestone overlay — an iOS-notification-style pill that floats about
       a third of the way down during its 7-day window. Full width minus
       small side margins, rounded, with a drop shadow. */
    .milestone {
      position: fixed;
      top: clamp(16px, 7vh, 60px);
      left: max(12px, env(safe-area-inset-left));
      right: max(12px, env(safe-area-inset-right));
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(2px, 0.8vw, 5px);
      padding: clamp(9px, 2.4vw, 14px) clamp(16px, 5vw, 24px);
      border-radius: 22px;
      background: rgba(244, 248, 255, 0.97);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.55);
      animation: milestone-in 0.5s cubic-bezier(0.2, 0.7, 0.2, 1) both;
    }
    .milestone[hidden] { display: none; }

    /* Number — small (stacked above an even smaller caption). */
    .milestone-num {
      font-family: 'DSEG7', 'Courier New', monospace;
      font-size: clamp(17px, 4.6vw, 26px);
      line-height: 1;
      letter-spacing: 0.04em;
      color: #2b6cff;
      text-shadow: 0 0 8px rgba(43, 108, 255, 0.2);
    }

    .milestone-label {
      font-family: 'Courier New', monospace;
      font-size: clamp(8px, 2vw, 11px);
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: #5a7bb5;
    }

    @keyframes milestone-in {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Tap-to-reveal "days used" — sits BELOW the countdown */
    .used-toggle {
      margin-top: clamp(22px, 6vw, 48px);
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(3px, 1vw, 7px);
      background: none;
      border: 1px solid var(--dim);
      border-radius: 16px;
      padding: clamp(10px, 2.6vw, 14px) clamp(20px, 6vw, 32px);
      color: var(--label);
      font-family: 'Courier New', monospace;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: border-color 0.3s ease, background 0.3s ease;
    }
    .used-toggle:active { border-color: var(--digit-glow); }
    .used-toggle.open { border-color: rgba(43, 108, 255, 0.25); background: rgba(43, 108, 255, 0.04); }

    /* Number (on top) always reserves its space; only opacity/transform
       animate, so revealing it never shifts the countdown above. */
    .used-toggle .used-num {
      font-family: 'DSEG7', 'Courier New', monospace;
      font-size: clamp(20px, 6vw, 34px);
      line-height: 1;
      letter-spacing: 0.04em;
      color: var(--digit);
      text-shadow: 0 0 8px var(--digit-glow), 0 0 20px var(--digit-glow);
      opacity: 0;
      transform: translateY(6px) scale(0.94);
      transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.2, 0.7, 0.2, 1);
    }
    .used-toggle.open .used-num {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
    /* Caption (beneath the number) — a touch smaller. */
    .used-toggle .used-text {
      font-size: clamp(8px, 2vw, 11px);
      letter-spacing: 0.32em;
      text-transform: uppercase;
      transition: color 0.3s ease;
    }
    .used-toggle.open .used-text { color: var(--digit); }

    @media (orientation: portrait) and (max-width: 520px) {
      .countdown { grid-template-columns: repeat(2, auto); }
    }
  </style>
</head>
<body>
  <div class="milestone" id="milestone" hidden aria-live="polite">
    <span class="milestone-num" id="milestoneDays" data-shadow="888">000</span>
    <span class="milestone-label">Days Left</span>
  </div>

  <main class="countdown" aria-label="Countdown to June 8, 2027">
    <div class="unit">
      <div class="digits" id="days" data-shadow="888">000</div>
      <div class="label">Days</div>
    </div>
    <div class="unit">
      <div class="digits" id="hours" data-shadow="88">00</div>
      <div class="label">Hours</div>
    </div>
    <div class="unit">
      <div class="digits" id="minutes" data-shadow="88">00</div>
      <div class="label">Minutes</div>
    </div>
    <div class="unit">
      <div class="digits" id="seconds" data-shadow="88">00</div>
      <div class="label">Seconds</div>
    </div>
  </main>

  <button class="used-toggle" id="usedToggle" type="button" aria-expanded="false">
    <span class="used-num" id="usedDays" data-shadow="888">000</span>
    <span class="used-text">Days Used</span>
  </button>

  <div class="footer">TARGET &middot; 2027-06-08 00:00 LOCAL</div>

  <script>
    // The "year of life" window — LOCAL midnight (no trailing Z = local time).
    const START  = new Date('2026-06-08T00:00:00').getTime();
    const TARGET = new Date('2027-06-08T00:00:00').getTime();

    const DAY  = 86_400_000;
    const HOUR = 3_600_000;
    const MIN  = 60_000;
    const SEC  = 1_000;

    // Quarter milestones: each opens a 7-day overlay showing days remaining.
    // 3 months used -> 9 left, 6 -> 6, 9 -> 3.
    const WEEK = 7 * DAY;
    const MILESTONES = [
      new Date('2026-09-08T00:00:00').getTime(), // 9 months left
      new Date('2026-12-08T00:00:00').getTime(), // 6 months left
      new Date('2027-03-08T00:00:00').getTime(), // 3 months left
    ];

    const $days    = document.getElementById('days');
    const $hours   = document.getElementById('hours');
    const $minutes = document.getElementById('minutes');
    const $seconds = document.getElementById('seconds');
    const $usedToggle = document.getElementById('usedToggle');
    const $usedDays   = document.getElementById('usedDays');
    const $milestone     = document.getElementById('milestone');
    const $milestoneDays = document.getElementById('milestoneDays');

    const pad = (n, w) => String(Math.max(0, n)).padStart(w, '0');

    // Add ?preview to the URL to force the milestone overlay on (for design review).
    const PREVIEW = new URLSearchParams(location.search).has('preview');

    function render() {
      const now  = Date.now();
      const diff = TARGET - now;

      // Days used since the start of the year (clamped to the window).
      const used = Math.min(365, Math.max(0, Math.floor((now - START) / DAY)));
      $usedDays.textContent = String(used);
      $usedDays.dataset.shadow = '8'.repeat(String(used).length); // ghost matches width

      // Milestone overlay: active while now is within a 7-day window (or in preview).
      const active = MILESTONES.find(m => now >= m && now < m + WEEK);
      if ((active !== undefined || PREVIEW) && diff > 0) {
        const left = Math.ceil(diff / DAY);
        $milestoneDays.textContent = String(left);
        $milestoneDays.dataset.shadow = '8'.repeat(String(left).length);
        $milestone.hidden = false;
      } else {
        $milestone.hidden = true;
      }

      if (diff <= 0) {
        $days.textContent    = '000';
        $hours.textContent   = '00';
        $minutes.textContent = '00';
        $seconds.textContent = '00';
        return false;
      }
      $days.textContent    = pad(Math.floor(diff / DAY), 3);
      $hours.textContent   = pad(Math.floor((diff % DAY)  / HOUR), 2);
      $minutes.textContent = pad(Math.floor((diff % HOUR) / MIN),  2);
      $seconds.textContent = pad(Math.floor((diff % MIN)  / SEC),  2);
      return true;
    }

    // Tap below the countdown to toggle the "days used" number on/off.
    $usedToggle.addEventListener('click', () => {
      const open = $usedToggle.classList.toggle('open');
      $usedToggle.setAttribute('aria-expanded', String(open));
    });

    render();
    const id = setInterval(() => { if (!render()) clearInterval(id); }, 1000);

    // Resync when the phone wakes from sleep
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) render();
    });
  </script>
</body>
</html>
